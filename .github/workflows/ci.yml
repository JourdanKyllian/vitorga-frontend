name: CI — vitorga-front

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint & TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vitorga_front   
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./vitorga_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: ./vitorga_front   
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./vitorga_front/package-lock.json   

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: vitorga_front/dist/   

  docker-build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./vitorga_front 
          push: false
          tags: vitorga_front:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-client
          path: /tmp/image.tar

  trivy-scan:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image-client
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vitorga_front:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'