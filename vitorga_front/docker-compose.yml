version: '3.8'

services:
  client:
    build:
      context: .
      target: production
    ports:
      - "80:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    networks:
      - vitorga-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  vitorga-network:
    driver: bridge